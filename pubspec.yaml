name: hotswing
description: "matching"
publish_to: "none"
version: 1.0.0+2

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5
  realm: ^20.2.0
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  device_info_plus: ^12.3.0
  flutter_dotenv: ^6.0.0
  crypto: ^3.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "assets/icon/app_icon.png"
  adaptive_icon_foreground: "assets/icon/app_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - .env
